name: Daily OFAC Sanctions Update

on:
  schedule:
    # Every day at 13:00 UTC (9:00 AM ET / EDT)
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Restore previous snapshots from cache
        uses: actions/cache/restore@v4
        with:
          path: data/snapshots
          key: sanctions-snapshots-${{ github.run_id }}
          restore-keys: |
            sanctions-snapshots-

      - name: Run daily pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        working-directory: scripts
        run: python run_daily.py

      - name: Delete old snapshot cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh cache list --key sanctions-snapshots- --json id,key -q '.[].key' | while read key; do
            gh cache delete "$key" || true
          done

      - name: Save snapshots to cache
        uses: actions/cache/save@v4
        with:
          path: data/snapshots
          key: sanctions-snapshots-${{ github.run_id }}

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/meta.json data/overview_stats.json data/diffs/ data/map/ data/programs/ data/summaries/ data/registry/ data/timeline/
          git diff --cached --quiet || git commit -m "chore: daily sanctions data update $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        if: env.VERCEL_TOKEN != ''
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
