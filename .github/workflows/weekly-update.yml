name: Weekly OFAC Sanctions Update

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Restore previous snapshots from cache
        uses: actions/cache@v4
        with:
          path: data/snapshots
          key: sanctions-snapshots-${{ github.run_id }}
          restore-keys: |
            sanctions-snapshots-

      - name: Run weekly pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        working-directory: scripts
        run: python run_weekly.py

      - name: Save snapshots to cache
        uses: actions/cache/save@v4
        with:
          path: data/snapshots
          key: sanctions-snapshots-${{ github.run_id }}

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/meta.json data/overview_stats.json data/diffs/ data/map/ data/programs/ data/summaries/
          git diff --cached --quiet || git commit -m "chore: weekly sanctions data update $(date -u +%Y-%m-%d)"
          git push
